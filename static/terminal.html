<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgeNode Terminal</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-terminal: #0d1117;
            --text-primary: #e8e8f0;
            --text-secondary: #9898a8;
            --text-muted: #686878;
            --accent: #8b5cf6;
            --success: #10b981;
            --error: #ef4444;
            --border: #2a2a3a;
            --terminal-green: #39ff14;
            --terminal-cursor: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #1a1a25 100%);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border: none;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
        }

        /* Tab Bar */
        .tab-bar {
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }

        .tab-bar::-webkit-scrollbar {
            height: 4px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px 6px 0 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            position: relative;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tab.active {
            background: var(--bg-terminal);
            color: var(--text-primary);
            border-bottom-color: var(--bg-terminal);
        }

        .tab-close {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            font-size: 0.7rem;
            opacity: 0.5;
            transition: all 0.15s;
        }

        .tab-close:hover {
            opacity: 1;
            background: var(--error);
            color: white;
        }

        .new-tab-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 1rem;
        }

        .new-tab-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Terminal Area */
        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-terminal);
            overflow: hidden;
        }

        .terminal-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .terminal {
            height: 100%;
            padding: 12px 16px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .terminal::-webkit-scrollbar {
            width: 8px;
        }

        .terminal::-webkit-scrollbar-track {
            background: var(--bg-terminal);
        }

        .terminal::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        /* Terminal Output */
        .terminal-line {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .terminal-line.command {
            color: var(--terminal-green);
        }

        .terminal-line.command::before {
            content: "$ ";
            color: var(--terminal-green);
        }

        .terminal-line.output {
            color: var(--text-primary);
        }

        .terminal-line.error {
            color: var(--error);
        }

        .terminal-line.info {
            color: var(--text-secondary);
        }

        /* Input Area */
        .input-area {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            gap: 10px;
        }

        .prompt {
            color: var(--terminal-green);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            caret-color: var(--terminal-cursor);
        }

        .terminal-input::placeholder {
            color: var(--text-muted);
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .status-left, .status-right {
            display: flex;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.disconnected {
            background: var(--error);
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 60px;
            right: 20px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: slideIn 0.2s ease;
        }

        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Shortcuts Help */
        .shortcuts-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            z-index: 1001;
            min-width: 300px;
            display: none;
        }

        .shortcuts-panel.visible {
            display: block;
        }

        .shortcuts-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
        }

        .shortcut-key {
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
        }

        .overlay.visible {
            display: block;
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 10px 12px;
            }

            .logo {
                font-size: 1rem;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px;
            }

            .header-actions .btn {
                padding: 8px 12px;
                font-size: 0.75rem;
            }

            .tab-bar {
                padding: 6px 8px;
                gap: 6px;
            }

            .tab {
                padding: 6px 10px;
                font-size: 0.75rem;
            }

            .terminal {
                font-size: 0.85rem;
                padding: 10px 12px;
            }

            .input-area {
                padding: 8px 12px;
            }

            .prompt {
                font-size: 0.85rem;
            }

            .terminal-input {
                font-size: 0.85rem;
            }

            .status-bar {
                flex-wrap: wrap;
                gap: 10px;
                padding: 6px 10px;
                font-size: 0.65rem;
            }

            .shortcuts-panel {
                width: 90%;
                padding: 16px;
            }

            .shortcut-item {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .header-actions .btn {
                padding: 6px 10px;
                font-size: 0.7rem;
            }

            .tab {
                padding: 5px 8px;
                font-size: 0.7rem;
            }

            .new-tab-btn {
                width: 24px;
                height: 24px;
            }

            .terminal {
                font-size: 0.8rem;
            }

            .status-right {
                display: none;
            }
        }

        /* Touch improvements */
        @media (hover: none) and (pointer: coarse) {
            .btn {
                min-height: 44px;
                min-width: 44px;
            }

            .btn:active {
                transform: scale(0.97);
                opacity: 0.9;
            }

            .tab {
                min-height: 44px;
            }

            .terminal-input {
                min-height: 44px;
            }

            .terminal {
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">BridgeNode Terminal</div>
            <div class="header-actions">
                <button class="btn" onclick="clearTerminal()">Clear</button>
                <button class="btn" onclick="showShortcuts()">Shortcuts</button>
                <button class="btn btn-primary" onclick="newTab()">+ New Tab</button>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar" id="tabBar">
            <div class="tab active" data-session="default" onclick="switchTab('default')">
                <span>Terminal 1</span>
                <span class="tab-close" onclick="closeTab(event, 'default')">×</span>
            </div>
            <button class="new-tab-btn" onclick="newTab()">+</button>
        </div>

        <!-- Terminal Area -->
        <div class="terminal-container">
            <div class="terminal-wrapper">
                <div class="terminal" id="terminal"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <span class="prompt">$</span>
                <input
                    type="text"
                    class="terminal-input"
                    id="terminalInput"
                    placeholder="Type command and press Enter..."
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <div class="status-item">
                    <span class="status-dot" id="connectionDot"></span>
                    <span id="connectionStatus">Connecting...</span>
                </div>
                <div class="status-item" id="sessionInfo">
                    Session: <span id="sessionId">-</span>
                </div>
            </div>
            <div class="status-right">
                <div class="status-item">
                    <span id="commandCount">0</span> commands executed
                </div>
                <div class="status-item">
                    <span id="currentTime">--:--:--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Shortcuts Panel -->
    <div class="overlay" id="overlay" onclick="hideShortcuts()"></div>
    <div class="shortcuts-panel" id="shortcutsPanel">
        <div class="shortcuts-title">Keyboard Shortcuts</div>
        <div class="shortcut-item">
            <span>New Tab</span>
            <span class="shortcut-key">Ctrl+T</span>
        </div>
        <div class="shortcut-item">
            <span>Close Tab</span>
            <span class="shortcut-key">Ctrl+W</span>
        </div>
        <div class="shortcut-item">
            <span>Next Tab</span>
            <span class="shortcut-key">Ctrl+Tab</span>
        </div>
        <div class="shortcut-item">
            <span>Previous Tab</span>
            <span class="shortcut-key">Ctrl+Shift+Tab</span>
        </div>
        <div class="shortcut-item">
            <span>Clear Terminal</span>
            <span class="shortcut-key">Ctrl+L</span>
        </div>
        <div class="shortcut-item">
            <span>Command History (Up)</span>
            <span class="shortcut-key">↑</span>
        </div>
        <div class="shortcut-item">
            <span>Command History (Down)</span>
            <span class="shortcut-key">↓</span>
        </div>
    </div>

    <script>
        // ====================
        // Terminal State
        // ====================
        const API_BASE = window.location.origin;
        let ws = null;
        let currentSession = 'default';
        let tabCount = 1;
        let commandCount = 0;
        let commandHistory = [];
        let historyIndex = -1;
        let currentInput = '';
        let terminalEl = document.getElementById('terminal');
        let inputEl = document.getElementById('terminalInput');

        // ====================
        // WebSocket Manager with Exponential Backoff & Heartbeat
        // ====================
        class WebSocketManager {
            constructor(config) {
                this.url = config.url;
                this.onMessage = config.onMessage || (() => {});
                this.onOpen = config.onOpen || (() => {});
                this.onClose = config.onClose || (() => {});
                this.onError = config.onError || (() => {});
                this.onStatusChange = config.onStatusChange || (() => {});

                this.initialDelay = config.initialDelay || 1000;
                this.maxDelay = config.maxDelay || 30000;
                this.backoffMultiplier = config.backoffMultiplier || 2;
                this.maxRetries = config.maxRetries || 10;
                this.heartbeatInterval = config.heartbeatInterval || 30000;
                this.heartbeatTimeout = config.heartbeatTimeout || 5000;

                this.ws = null;
                this.retryCount = 0;
                this.currentDelay = this.initialDelay;
                this.heartbeatTimer = null;
                this.reconnectTimer = null;
                this.isManualClose = false;
                this.lastPingTime = 0;
                this.status = 'disconnected';
            }

            connect() {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) return;

                this.isManualClose = false;
                this.updateStatus('connecting');

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}${this.url}`;

                try {
                    this.ws = new WebSocket(wsUrl);

                    this.ws.onopen = () => {
                        console.log('[WS] Connected');
                        this.retryCount = 0;
                        this.currentDelay = this.initialDelay;
                        this.updateStatus('connected');
                        this.startHeartbeat();
                        this.onOpen();
                    };

                    this.ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === 'pong') {
                                this.lastPingTime = 0;
                                return;
                            }
                            this.onMessage(data);
                        } catch (e) {
                            this.onMessage({ type: 'text', data: event.data });
                        }
                    };

                    this.ws.onclose = (event) => {
                        console.log('[WS] Disconnected:', event.code);
                        this.stopHeartbeat();
                        this.updateStatus('disconnected');
                        this.onClose(event);

                        if (!this.isManualClose) {
                            this.scheduleReconnect();
                        }
                    };

                    this.ws.onerror = (error) => {
                        console.error('[WS] Error:', error);
                        this.onError(error);
                    };
                } catch (err) {
                    console.error('[WS] Connection failed:', err);
                    this.scheduleReconnect();
                }
            }

            disconnect() {
                this.isManualClose = true;
                this.stopHeartbeat();
                this.cancelReconnect();
                if (this.ws) {
                    this.ws.close(1000, 'Manual close');
                    this.ws = null;
                }
                this.updateStatus('disconnected');
            }

            send(data) {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify(data));
                    return true;
                }
                return false;
            }

            scheduleReconnect() {
                if (this.retryCount >= this.maxRetries) {
                    console.log('[WS] Max retries reached');
                    this.updateStatus('failed');
                    return;
                }

                this.updateStatus('reconnecting');
                const delay = this.currentDelay;
                this.retryCount++;
                this.currentDelay = Math.min(this.currentDelay * this.backoffMultiplier, this.maxDelay);

                console.log(`[WS] Reconnecting in ${delay}ms (attempt ${this.retryCount})`);

                this.reconnectTimer = setTimeout(() => {
                    this.connect();
                }, delay);
            }

            cancelReconnect() {
                if (this.reconnectTimer) {
                    clearTimeout(this.reconnectTimer);
                    this.reconnectTimer = null;
                }
            }

            startHeartbeat() {
                this.stopHeartbeat();
                this.heartbeatTimer = setInterval(() => {
                    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                        this.send({ type: 'ping', timestamp: Date.now() });
                        this.lastPingTime = Date.now();

                        setTimeout(() => {
                            if (this.lastPingTime !== 0) {
                                console.log('[WS] Heartbeat timeout');
                                this.ws.close(4000, 'Heartbeat timeout');
                            }
                        }, this.heartbeatTimeout);
                    }
                }, this.heartbeatInterval);
            }

            stopHeartbeat() {
                if (this.heartbeatTimer) {
                    clearInterval(this.heartbeatTimer);
                    this.heartbeatTimer = null;
                }
            }

            updateStatus(status) {
                this.status = status;
                this.onStatusChange(status, {
                    retryCount: this.retryCount,
                    maxRetries: this.maxRetries,
                    nextDelay: this.currentDelay
                });
            }
        }

        // ====================
        // WebSocket Connection (Enhanced)
        // ====================
        let terminalWsManager = null;

        function initWebSocket() {
            terminalWsManager = new WebSocketManager({
                url: '/ws/terminal',
                initialDelay: 1000,
                maxDelay: 30000,
                backoffMultiplier: 2,
                maxRetries: 10,
                heartbeatInterval: 30000,

                onMessage: (data) => {
                    handleMessage(data);
                },

                onOpen: () => {
                    updateConnectionStatus(true, 'Connected');
                    // Initialize session
                    terminalWsManager.send({
                        type: 'init',
                        session_id: currentSession
                    });
                },

                onClose: () => {
                    updateConnectionStatus(false, 'Disconnected');
                },

                onError: (error) => {
                    console.error('WebSocket error:', error);
                    updateConnectionStatus(false, 'Error');
                },

                onStatusChange: (status, info) => {
                    updateReconnectStatusUI(status, info);
                }
            });

            terminalWsManager.connect();
        }

        function updateReconnectStatusUI(status, info) {
            const dot = document.getElementById('connectionDot');
            const statusEl = document.getElementById('connectionStatus');
            if (!dot || !statusEl) return;

            dot.classList.remove('connected', 'disconnected', 'connecting', 'reconnecting', 'error');
            if (status === 'connected') {
                dot.classList.add('connected');
                statusEl.textContent = 'Connected';
            } else if (status === 'connecting') {
                dot.classList.add('connecting');
                statusEl.textContent = 'Connecting...';
            } else if (status === 'reconnecting') {
                dot.classList.add('reconnecting');
                statusEl.textContent = `Reconnecting (${info.retryCount}/${info.maxRetries})...`;
            } else if (status === 'failed') {
                dot.classList.add('error');
                statusEl.textContent = 'Connection failed';
            } else {
                dot.classList.add('disconnected');
                statusEl.textContent = 'Disconnected';
            }
        }

        function handleMessage(data) {
            const type = data.type;

            if (type === 'init') {
                document.getElementById('sessionId').textContent = data.session_id;
                if (data.welcome) {
                    appendOutput(data.welcome, 'info');
                }
            } else if (type === 'output') {
                appendOutput(data.content, data.is_command ? 'command' : 'output');
            } else if (type === 'exit') {
                commandCount++;
                document.getElementById('commandCount').textContent = commandCount;
                if (data.code !== 0) {
                    appendOutput(`\n[Process exited with code ${data.code}]\n`, 'error');
                }
            } else if (type === 'error') {
                appendOutput(data.content, 'error');
            } else if (type === 'clear') {
                terminalEl.innerHTML = '';
            } else if (type === 'history') {
                inputEl.value = data.command;
            }
        }

        function updateConnectionStatus(connected, text) {
            const dot = document.getElementById('connectionDot');
            const status = document.getElementById('connectionStatus');

            dot.classList.remove('connected', 'disconnected', 'connecting');
            if (connected) {
                dot.classList.add('connected');
                status.textContent = text;
            } else {
                dot.classList.add('disconnected');
                status.textContent = text;
            }
        }

        // ====================
        // Terminal Output
        // ====================
        function appendOutput(text, type = 'output') {
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            line.textContent = text;
            terminalEl.appendChild(line);
            terminalEl.scrollTop = terminalEl.scrollHeight;
        }

        function clearTerminal() {
            terminalEl.innerHTML = '';
            if (terminalWsManager) {
                terminalWsManager.send({ type: 'clear' });
            }
            showToast('Terminal cleared');
        }

        // ====================
        // Command Execution
        // ====================
        function sendCommand(command) {
            if (!command.trim()) {
                appendOutput('\n');
                return;
            }

            // Add to local history
            if (!commandHistory.length || commandHistory[commandHistory.length - 1] !== command) {
                commandHistory.push(command);
            }
            historyIndex = commandHistory.length;

            // Send to server
            if (terminalWsManager) {
                terminalWsManager.send({
                    type: 'command',
                    command: command
                });
            }

            currentInput = '';
        }

        function navigateHistory(direction) {
            if (!commandHistory.length) return;

            if (direction === 'up' && historyIndex > 0) {
                historyIndex--;
            } else if (direction === 'down' && historyIndex < commandHistory.length) {
                historyIndex++;
            }

            const cmd = commandHistory[historyIndex] || '';
            inputEl.value = cmd;
        }

        // ====================
        // Tab Management
        // ====================
        function newTab() {
            tabCount++;
            const sessionId = `term_${Date.now()}`;

            // Create new tab
            const tabBar = document.getElementById('tabBar');
            const newTabBtn = tabBar.querySelector('.new-tab-btn');

            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.dataset.session = sessionId;
            tab.innerHTML = `
                <span>Terminal ${tabCount}</span>
                <span class="tab-close" onclick="closeTab(event, '${sessionId}')">×</span>
            `;
            tab.onclick = () => switchTab(sessionId);

            tabBar.insertBefore(tab, newTabBtn);

            // Switch to new tab
            switchTab(sessionId);
        }

        function switchTab(sessionId) {
            // Update tab UI
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-session="${sessionId}"]`).classList.add('active');

            // Save current session state
            // For simplicity, we'll just switch the session ID
            currentSession = sessionId;

            // Reconnect with new session
            if (terminalWsManager) {
                terminalWsManager.disconnect();
            }
            initWebSocket();
        }

        function closeTab(event, sessionId) {
            event.stopPropagation();

            const tabs = document.querySelectorAll('.tab');
            if (tabs.length <= 1) {
                showToast('Cannot close the last tab');
                return;
            }

            // Remove tab
            const tab = document.querySelector(`.tab[data-session="${sessionId}"]`);
            if (tab) {
                tab.remove();
            }

            // If closing active tab, switch to another
            if (document.querySelector('.tab.active') === null) {
                const firstTab = document.querySelector('.tab');
                if (firstTab) {
                    switchTab(firstTab.dataset.session);
                }
            }

            showToast('Tab closed');
        }

        // ====================
        // UI Helpers
        // ====================
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 2000);
        }

        function showShortcuts() {
            document.getElementById('overlay').classList.add('visible');
            document.getElementById('shortcutsPanel').classList.add('visible');
        }

        function hideShortcuts() {
            document.getElementById('overlay').classList.remove('visible');
            document.getElementById('shortcutsPanel').classList.remove('visible');
        }

        // ====================
        // Clock
        // ====================
        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ====================
        // Event Listeners
        // ====================
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendCommand(inputEl.value);
                inputEl.value = '';
                currentInput = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                navigateHistory('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                navigateHistory('down');
            } else if (e.key === 'l' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                clearTerminal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl+T: New Tab
            if ((e.ctrlKey || e.metaKey) && e.key === 't') {
                e.preventDefault();
                newTab();
            }
            // Ctrl+W: Close Tab
            if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
                e.preventDefault();
                closeTab(e, currentSession);
            }
            // Ctrl+L: Clear (handled in input)
            // Focus input on any key
            if (!e.ctrlKey && !e.metaKey && !e.altKey &&
                document.activeElement !== inputEl &&
                e.key.length === 1) {
                inputEl.focus();
            }
        });

        // ====================
        // Initialize
        // ====================
        initWebSocket();
        inputEl.focus();
    </script>
</body>
</html>
