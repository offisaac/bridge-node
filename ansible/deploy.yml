---
# Bridge-Node Deployment Playbook
# 用于自动化部署 Bridge-Node 到服务器

- name: Deploy Bridge-Node
  hosts: production
  become: yes
  vars:
    app_name: bridge-node
    app_dir: /opt/{{ app_name }}
    python_version: "3.11"
    redis_version: "7"

  tasks:
    # 1. 更新系统
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # 2. 安装系统依赖
    - name: Install system packages
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - curl
          - nginx
          - redis-server
          - supervisor
        state: present

    # 3. 创建应用目录
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    # 4. 部署代码
    - name: Deploy application code
      git:
        repo: "{{ lookup('env', 'REPO_URL') }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: www-data

    # 5. 安装 Python 依赖
    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        executable: pip3

    # 6. 配置 Supervisor
    - name: Configure Supervisor
      template:
        src: supervisor.conf.j2
        dest: "/etc/supervisor/conf.d/{{ app_name }}.conf"
      notify: Restart bridge-node

    # 7. 配置 Nginx
    - name: Configure Nginx
      template:
        src: nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ app_name }}"
      notify: Reload nginx

    - name: Enable Nginx site
      file:
        src: "/etc/nginx/sites-available/{{ app_name }}"
        dest: "/etc/nginx/sites-enabled/{{ app_name }}"
        state: link

    # 8. 配置防火墙
    - name: Configure UFW firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - 80
        - 443
        - 8888

    # 9. 启动服务
    - name: Ensure Supervisor started
      supervisorctl:
        state: started

    - name: Ensure Nginx started
      service:
        name: nginx
        state: started

  handlers:
    - name: Restart bridge-node
      supervisorctl:
        name: "{{ app_name }}"
        state: restarted

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
